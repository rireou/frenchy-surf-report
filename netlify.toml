[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/observe"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/observe-seaford"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/observe-middleton"
  to = "/middleton.html"
  status = 200

[[redirects]]
  from = "/middleton"
  to = "/middleton.html"
  status = 200

[[redirects]]
  from = "/wave-map"
  to = "/wave-map.html"
  status = 200

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/observe"
  [headers.values]
    Cache-Control = "private, no-store"
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/observe-*"
  [headers.values]
    Cache-Control = "private, no-store"
    X-Robots-Tag = "noindex, nofollow"
