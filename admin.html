<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Frenchy Beach Check Admin</title><style>:root{color-scheme:dark;font-family:Inter,system-ui,sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:#061b24;color:#f6fbfc;display:grid;place-items:center;padding:18px}.box{width:min(620px,100%);padding:24px;border-radius:24px;background:#103845;border:1px solid rgba(151,227,229,.22);box-shadow:0 24px 70px rgba(0,0,0,.35)}h1{margin:0 0 6px;font-size:28px}p{color:#b9cdd3;line-height:1.5}label{display:block;margin:16px 0 6px;font-weight:850;font-size:13px}input,select,textarea,button{width:100%;padding:13px 14px;border-radius:13px;border:1px solid rgba(255,255,255,.18);background:#062632;color:white;font:inherit}textarea{min-height:150px;resize:vertical}button{margin-top:16px;background:linear-gradient(135deg,#84efc3,#67dbe9);color:#06212a;border:0;font-weight:950;cursor:pointer}.row{display:flex;gap:10px;align-items:center;margin-top:14px}.row input{width:auto}.row label{margin:0}.status{min-height:24px;margin-top:12px;font-weight:850}.back{display:inline-block;margin-top:16px;color:#84efc3}</style></head><body><main class="box"><h1>Frenchy Beach Check</h1><p>Private publisher. Visitors can read your observation but cannot edit it.</p><label for="password">Private password</label><input id="password" type="password" autocomplete="current-password"><label for="spot">Beach</label><select id="spot"><option value="seaford">Seaford</option><option value="middleton">Middleton</option></select><label for="headline">Short heading</label><input id="headline" maxlength="80" value="Frenchy checked the beach"><label for="note">Your observation</label><textarea id="note" maxlength="600" placeholder="Example: Cleaner than forecast. Waist-high sets, best on a longboard before the wind strengthens."></textarea><div class="row"><input id="active" type="checkbox" checked><label for="active">Show this observation publicly</label></div><button id="publish">Publish beach check</button><div class="status" id="status"></div><a class="back" href="./">Back to report</a></main><script>const $=id=>document.getElementById(id);$('publish').addEventListener('click',async()=>{const button=$('publish');button.disabled=true;$('status').textContent='Publishing…';try{const spot=$('spot').value;const response=await fetch(`/.netlify/functions/beach-check?spot=${spot}`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${$('password').value}`},body:JSON.stringify({headline:$('headline').value,note:$('note').value,active:$('active').checked})});const result=await response.json();if(!response.ok)throw new Error(result.error||'Could not publish');$('status').textContent='Published! The public report will update now.'}catch(error){$('status').textContent=error.message}finally{button.disabled=false}});</script></body></html>
